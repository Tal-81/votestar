<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VoteStar{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/">
        <span class="logo-star">★</span> VoteStar
      </a>
      <div class="nav-links">
        {% if user.is_authenticated %}
          <a href="" class="btn btn-sm btn-primary">+ New Topic</a>
          <a href="" class="nav-link notif-link">
            🔔

          <form method="post" action="" style="display:inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-ghost">Logout</button>
          </form>
        {% else %}
          <a href="" class="btn btn-sm btn-ghost">Login</a>
          <a href="}" class="btn btn-sm btn-primary">Sign Up</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash Messages -->
  {% if messages %}
    <div class="messages-container">
      {% for msg in messages %}
        <div class="">
          {{ msg }}
          <button class="msg-close" onclick="">×</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- Page Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>VoteStar — share your opinions, one star at a time ★</p>
  </footer>

</body>
</html>
